name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Build + tests unitaires
  # ──────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            g++ \
            libopencv-dev \
            libx11-dev \
            libxtst-dev \
            libgtest-dev \
            libgmock-dev

      - name: Configure (Release + tests)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run unit tests
        run: cd build && ctest --output-on-failure --parallel $(nproc)

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build Debug (détecte les warnings supplémentaires)
  # ──────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++ libopencv-dev libx11-dev libxtst-dev

      - name: Configure (Debug + warnings)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Wshadow -Wnon-virtual-dtor"

      - name: Build
        run: cmake --build build --parallel $(nproc)

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Lint — clang-format (norme de formatage)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          FILES=$(find src include tests -name '*.cpp' -o -name '*.hpp' 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "No files to check."
            exit 0
          fi
          FAILED=0
          for f in $FILES; do
            if ! clang-format --dry-run --Werror "$f" 2>/dev/null; then
              echo "Format error: $f"
              FAILED=1
            fi
          done
          exit $FAILED
